    <section id="donation-card">
      <h2>Donation Card</h2>

      <article>
        <form class="donation-form">
          <div class="form-group">
            <label for="first-name">First Name *</label>
            <input type="text" id="first-name" name="first-name" required />
          </div>

          <div class="form-group">
            <label for="last-name">Last Name *</label>
            <input type="text" id="last-name" name="last-name" required />
          </div>

          <div class="form-group">
            <label for="organization">Organization</label>
            <input type="text" id="organization" name="organization" />
          </div>

          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" />
          </div>

          <div class="form-group">
            <label for="address">Address *</label>
            <input type="text" id="address" name="address" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone *</label>
            <input type="tel" id="phone" name="phone" required />
          </div>

          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form-group form-group--checkbox">
            <input type="checkbox" id="anonymous" name="anonymous" />
            <label for="anonymous"
              >Check this box if you wish to remain anonymous</label
            >
          </div>

          <fieldset class="donation-amounts">
            <legend>Amount Enclosed</legend>
            <div class="amount-options">
              <label><input type="radio" name="amount" value="20" /> $20</label>
              <label><input type="radio" name="amount" value="50" /> $50</label>
              <label><input type="radio" name="amount" value="75" /> $75</label>
              <label
                ><input type="radio" name="amount" value="150" /> $150</label
              >
              <label>
                <input type="radio" name="amount" value="other" /> Other
                <input
                  type="number"
                  id="other-amount"
                  name="other-amount"
                  placeholder="$"
                />
              </label>
            </div>
          </fieldset>

          <div class="form-group form-group--checkbox">
            <input type="checkbox" id="contact-donate" name="contact-donate" />
            <label for="contact-donate"
              >Amount to Donate &mdash; selecting this means we will contact you
              for payment information</label
            >
          </div>

          <p class="donate-online">
            Donate online at www.type32023exhibitions.org
          </p>
        </form>
      </article>
