<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donation Card — TYPE3 2026: AI/AS26</title>
    <link rel="stylesheet" href="https://use.typekit.net/tlc1wya.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/header.css" />
  </head>
  <body>
    <script src="js/menu-include.js"></script>

    <section id="donation-card">
      <h2>Donation Card</h2>
      <p class="donation-appeal">
        Your support helps bring bold, experimental art to life. Every
        contribution sustains the exhibitions, artists, and programs that make
        aftermodern.gallery possible.
      </p>

      <form class="donation-form">
        <!-- 1. Amount selection -->
        <fieldset class="donation-amounts">
          <legend>Choose an Amount</legend>
          <div class="amount-options">
            <label class="amount-chip">
              <input type="radio" name="amount" value="20" />
              <span>$20</span>
            </label>
            <label class="amount-chip">
              <input type="radio" name="amount" value="50" />
              <span>$50</span>
            </label>
            <label class="amount-chip">
              <input type="radio" name="amount" value="75" />
              <span>$75</span>
            </label>
            <label class="amount-chip">
              <input type="radio" name="amount" value="150" />
              <span>$150</span>
            </label>
            <label class="amount-chip amount-chip--other">
              <input type="radio" name="amount" value="other" />
              <span>Other</span>
              <input
                type="number"
                id="other-amount"
                name="other-amount"
                placeholder="$"
                min="1"
                step="1"
                inputmode="numeric"
                pattern="[0-9]*"
                aria-label="Custom donation amount"
              />
            </label>
          </div>
        </fieldset>

        <!-- 2. Contact details -->
        <fieldset class="donation-contact">
          <legend>Your Details</legend>

          <div class="form-row">
            <div class="form-group">
              <label for="first-name">First Name *</label>
              <input type="text" id="first-name" name="first-name" required />
            </div>
            <div class="form-group">
              <label for="last-name">Last Name *</label>
              <input type="text" id="last-name" name="last-name" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="organization">Organization</label>
              <input type="text" id="organization" name="organization" />
            </div>
            <div class="form-group">
              <label for="title">Title</label>
              <input type="text" id="title" name="title" />
            </div>
          </div>

          <div class="form-group">
            <label for="address">Address *</label>
            <input type="text" id="address" name="address" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone *</label>
            <input type="tel" id="phone" name="phone" required />
          </div>

          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required />
          </div>
        </fieldset>

        <!-- 3. Preferences -->
        <fieldset class="donation-preferences">
          <legend>Preferences</legend>

          <div class="form-group form-group--checkbox">
            <input type="checkbox" id="anonymous" name="anonymous" />
            <label for="anonymous"
              >I wish to remain anonymous</label
            >
          </div>

          <div class="form-group form-group--checkbox">
            <input type="checkbox" id="contact-donate" name="contact-donate" />
            <label for="contact-donate"
              >Contact me for payment information</label
            >
          </div>
        </fieldset>

        <!-- 4. Submit -->
        <button type="submit" class="donation-submit">Donate</button>

        <!-- 5. Online alternative -->
        <p class="donate-online">
          Or donate online at
          <a href="https://www.type32023exhibitions.org"
            >www.type32023exhibitions.org</a
          >
        </p>
      </form>
    </section>
    <script>
      const otherAmount = document.getElementById('other-amount');
      otherAmount.addEventListener('keydown', (e) => {
        if (
          e.key.length === 1 &&
          !/[0-9]/.test(e.key) &&
          !e.ctrlKey && !e.metaKey
        ) {
          e.preventDefault();
        }
      });
      otherAmount.addEventListener('paste', (e) => {
        const paste = (e.clipboardData || window.clipboardData).getData('text');
        if (!/^\d+$/.test(paste)) {
          e.preventDefault();
        }
      });
    </script>
    <script src="js/header.js"></script>
  </body>
</html>
