<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TYPE3 2026: AI/AS26 — Exhibition Guide</title>
    <link rel="stylesheet" href="https://use.typekit.net/tlc1wya.css" />
    <link rel="stylesheet" href="css/art.css" />
    <link rel="stylesheet" href="css/exhibit-bg.css" />
    <link rel="stylesheet" href="css/index-home.css" />
    <link rel="stylesheet" href="css/header.css" />
  </head>
  <body class="index-home">
    <script src="js/menu-include.js"></script>
    <script src="js/exhibit-bg.js"></script>

    <section id="main-menu">
      <article id="guide-home">
        <img src="img/exhibitLogoFull.svg" alt="TYPE3 2026: AI/AS26" class="home-logo">
        <button
          type="button"
          class="index-open-header"
          aria-label="Open site menu"
          aria-expanded="false"
          aria-controls="site-menu-overlay"
        >
          <svg
            class="index-open-header-ring"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
            focusable="false"
          >
            <rect
              class="index-open-header-ring-rect"
              x="1.125"
              y="1.125"
              width="calc(100% - 2.25px)"
              height="calc(100% - 2.25px)"
              rx="7"
              ry="7"
            />
          </svg>
          <span class="index-open-header-label">Exhibition Guide</span>
        </button>
      </article>
    </section>
    <script src="js/header.js"></script>
  </body>
</html>
